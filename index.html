<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do List</title>
    <meta name="description" content="A list for things that need doing.">
    <meta name="author" content="Michael Wong">
    <link rel="icon" href="img/favicon.ico">
    <link rel="stylesheet" href="css/index.css">
    <script src="js/index.js" defer></script>

    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
</head>

<body>
    <header>
        <nav class="navbar">
            <div class="navbar__title">To Do List</div>
            <ul class="navbar__list">
                <li class="navbar__items">
                    <span class="navbar__item load-button material-symbols-outlined">restore</span>
                    <span class="navbar__item save-button material-symbols-outlined">save</span>
                    <a href="/"><span class="navbar__item clear-button material-symbols-outlined">delete</span></a>
                </li>
            </ul>
        </nav>
    </header>
    <main>
        <ul class="todolist">
            <li class="todolist__item">
                <button type="submit" class="todolist__add-button"></button>
                <input type="text" class="todolist__field" value="">
            </li>
        </ul>
    </main>
    <footer>
        <p>a practice project by MICHAEL WONG</p>
    </footer>
</body>

</html>
